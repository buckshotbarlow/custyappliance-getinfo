# Harvester configuration

# Updated to reflect drive layout. Please change to reflect the configurations below. This selection is an example.
    device: /dev/nvme0n1
    datadisk: /dev/sda1
    vip_mode: static
    vip: 192.168.1.99
    management_interface:
      interfaces:
        - name: eno1
      method: static
      subnet_mask: 255.255.255.0
      gateway: 192.168.1.1
      bond_options:
        # Pick one
        mode: balance-tlb, active-failover, lacp
        miimon: 100
        # Do you use Jumbo frames? if so, select MTU: 9000
        MTU: 1500
      # Do you need kernel tuning? If yes, use this area to insert variables. If you do not know, leave blank.
